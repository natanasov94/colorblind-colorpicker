plugins {
    id 'java'
    id 'application'
}

group = 'org.colorblindcolorpicker'
version = '1.0.0'

repositories {
    mavenCentral()
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
}

application {
    mainClass = 'org.colorblindcolorpicker.Main'
}

jar {
    manifest {
        attributes(
                'Main-Class': 'org.colorblindcolorpicker.Main'
        )
    }
    from {
        configurations.runtimeClasspath.collect {
            it.isDirectory() ? it : zipTree(it)
        }
    }

    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
}

dependencies {
    implementation 'com.github.kwhat:jnativehook:2.2.2'
}

test {
    useJUnitPlatform()
}